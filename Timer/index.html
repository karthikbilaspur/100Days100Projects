<body>
    <main>
        <div class="timer-card" id="timer-card">
            <h1 class="app-title">Ultimate Timer <span class="brand-name">by karthiCodingSolutions</span></h1>

            <div class="top-controls">
                <div class="timer-mode-selector">
                    <label for="timer-mode">Mode:</label>
                    <select id="timer-mode" title="Select timer mode: Countdown or Count-Up">
                        <option value="countdown">Countdown</option>
                        <option value="countup">Count-Up</option>
                    </select>
                </div>
                <div class="utility-buttons">
                    <button id="mute-button" class="btn-icon" title="Mute/Unmute alarm sound" aria-label="Mute/Unmute alarm sound"><i class="fas fa-volume-up"></i></button>
                    <button id="fullscreen-button" class="btn-icon" title="Toggle Fullscreen" aria-label="Toggle Fullscreen"><i class="fas fa-expand"></i></button>
                </div>
            </div>

            <div class="timer-display-wrapper">
                <div id="timer-display" class="timer-display" aria-live="polite">00:00:00</div>
                <div class="progress-bar-container">
                    <div class="progress-bar"></div>
                </div>
                <div id="countdown-message" class="countdown-message hidden" aria-live="assertive"></div>
            </div>

            <div class="timer-controls">
                <button id="start-button" class="btn btn-start" aria-label="Start timer">Start</button>
                <button id="pause-button" class="btn btn-pause hidden" aria-label="Pause timer">Pause</button>
                <button id="stop-button" class="btn btn-stop" aria-label="Stop timer">Stop</button>
                <button id="reset-button" class="btn btn-reset" aria-label="Reset timer">Reset</button>
            </div>

            <div class="timer-settings">
                <h2>Set Custom Time</h2>
                <div class="input-group">
                    <label for="hours-input">Hours:</label>
                    <input type="number" id="hours-input" value="0" min="0" max="99" aria-label="Set hours" title="Hours (0-99)" />
                </div>
                <div class="input-group">
                    <label for="minutes-input">Minutes:</label>
                    <input type="number" id="minutes-input" value="0" min="0" max="59" aria-label="Set minutes" title="Minutes (0-59)" />
                </div>
                <div class="input-group">
                    <label for="seconds-input">Seconds:</label>
                    <input type="number" id="seconds-input" value="0" min="0" max="59" aria-label="Set seconds" title="Seconds (0-59)" />
                </div>
                <button id="set-timer-button" class="btn btn-set" aria-label="Apply custom time">Set Timer</button>
                <button id="clear-inputs-button" class="btn btn-clear-inputs" aria-label="Clear all input fields">Clear Inputs</button>
            </div>
            <audio id="alarm-sound" src="alarm.mp3" preload="auto" loop></audio> <!-- Create an alarm.mp3 file -->
        </div>
    </main>
