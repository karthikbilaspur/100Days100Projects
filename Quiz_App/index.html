<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Quiz Challenge - Test Your Knowledge!</title>

    <!-- Meta Tags for SEO -->
    <meta name="description" content="Test your CSS knowledge with this interactive and challenging quiz. Learn and improve your web development skills.">
    <meta name="keywords" content="CSS, Quiz, Web Development, Frontend, HTML, JavaScript, Learn CSS">
    <meta name="author" content="Karthik">

    <!-- Favicon -->
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">

    <!-- Preconnect for faster Font Awesome loading -->
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <!-- Preload Font Awesome CSS -->
    <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"></noscript>

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="quiz-header">
        <h1>CSS Quiz Challenge</h1>
    </header>

    <main>
        <!-- Start Quiz Section -->
        <section class="start-quiz-container active" id="start-section" role="region" aria-labelledby="start-title">
            <h2 id="start-title">Welcome to the CSS Quiz!</h2>
            <p>Test your knowledge of CSS and see how well you score.</p>
            <button id="start-quiz-btn" class="btn primary-btn" aria-label="Start the quiz now">Start Quiz</button>
        </section>

        <!-- Quiz Section -->
        <section class="quiz-container" id="quiz-section" role="region" aria-labelledby="current-question">
            <div class="quiz-info-bar">
                <p id="timer" role="timer" aria-live="polite">Time: <span id="time-left">60</span>s</p>
                <p id="score-display">Score: <span id="current-score">0</span></p>
                <div class="progress-wrapper">
                    <progress id="progress-bar" value="0" max="10"></progress>
                    <span id="question-count-display" class="visually-hidden">Question 1 of 10</span>
                </div>
            </div>

            <div class="question-area">
                <h2 id="current-question"></h2>
                <div id="options" class="options-list" role="radiogroup" aria-labelledby="current-question">
                    <!-- Options dynamically loaded here -->
                </div>
                <div id="feedback-area" class="feedback-message" role="status" aria-live="polite"></div>
            </div>

            <div class="quiz-actions">
                <button id="hint-btn" class="btn secondary-btn" aria-label="Get a hint for the current question">Hint</button>
                <button id="next-question-btn" class="btn primary-btn" aria-label="Go to the next question" disabled>Next Question</button>
            </div>
            <div id="hint-text" class="hint-display"  role="alert" aria-live="assertive"></div>
        </section>

        <!-- Results Section -->
        <section class="results-container" id="results-section" role="region" aria-labelledby="results-title">
            <h2 id="results-title">Quiz Completed!</h2>
            <p id="final-score">Your final score is: <span id="score-value">0</span> out of <span id="total-questions">10</span>.</p>
            <div class="results-actions">
                <button id="play-again-btn" class="btn primary-btn" aria-label="Play the quiz again">Play Again</button>
                <button id="view-leaderboard-btn" class="btn secondary-btn" aria-label="View the leaderboard">View Leaderboard</button>
            </div>
        </section>
    </main>

    <footer class="quiz-footer">
        <p>&copy; <span id="current-year"></span> Karthik. All Rights Reserved.</p>
        <div class="social-links">
            <a href="#" aria-label="Follow us on Twitter"><i class="fab fa-twitter"></i></a>
            <a href="#" aria-label="Connect with us on LinkedIn"><i class="fab fa-linkedin-in"></i></a>
            <a href="#" aria-label="View project on GitHub"><i class="fab fa-github"></i></a>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
