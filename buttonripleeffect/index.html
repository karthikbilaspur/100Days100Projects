<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="styles.css" />
  <title>Button Ripple Variations</title>
</head>
<body>
  <header>
    <h1>Button Ripple Effects Showcase</h1>
    <p>Click on each button to see its unique ripple!</p>
  </header>

  <div class="container">
    <section class="ripple-section">
      <h2>Classic Ripple</h2>
      <button class="ripple classic-ripple" aria-label="Classic Ripple Effect">
        Click Me (Classic)
      </button>
    </section>

    <section class="ripple-section">
      <h2>Gentle Wave</h2>
      <button class="ripple gentle-wave" aria-label="Gentle Wave Ripple Effect">
        Click Me (Gentle)
      </button>
    </section>

    <section class="ripple-section">
      <h2>Fast Flash</h2>
      <button class="ripple fast-flash" aria-label="Fast Flash Ripple Effect">
        Click Me (Fast)
      </button>
    </section>

    <section class="ripple-section">
      <h2>Big Pulse</h2>
      <button class="ripple big-pulse" aria-label="Big Pulse Ripple Effect">
        Click Me (Big)
      </button>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
