<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="A dynamic background slider showcasing beautiful landscapes with smooth transitions and interactive controls.">
    <title>Beautiful Background Slider</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" integrity="sha512-1ycn6IcaQQ40JuKakMvs9y97MrNpYwCH+JfJ6zSpNnfk2nwywQdYMj0f/KCNiV0+HwD8bcL/Gz4B1Q2mK9L+8g==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <div class="slider-container" role="region" aria-roledescription="carousel" aria-label="Image Slider">
        <div class="slider" aria-live="polite">
            <!-- Slides will be generated dynamically by JavaScript -->
            <div class="loading-overlay" aria-hidden="true">
                <div class="spinner"></div>
                <p>Loading images...</p>
            </div>
        </div>
        <div class="pagination" role="tablist" aria-label="Slide navigation">
            <!-- Pagination dots will be generated dynamically by JavaScript -->
        </div>
        <div class="navigation">
            <button class="nav-btn prev-btn" aria-label="Previous slide">
                <i class="fas fa-arrow-left"></i>
            </button>
            <button class="nav-btn next-btn" aria-label="Next slide">
                <i class="fas fa-arrow-right"></i>
            </button>
        </div>
    </div>
    <script src="script.js" defer></script>
</body>
</html>
