<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>100Days100Projects | Karthik V</title>
  <style>
    :root { --bg: #0d1117; --card: #161b22; --text: #c9d1d9; --accent: #58a6ff; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; margin: 0; padding: 2rem; }
    .header { text-align: center; margin-bottom: 2rem; }
    .header h1 { font-size: 3rem; margin: 0; }
    .filters { display: flex; gap: 1rem; justify-content: center; margin-bottom: 2rem; flex-wrap: wrap; }
    .filter-btn { background: var(--card); border: 1px solid #30363d; color: var(--text); padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer; }
    .filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem; }
    .card { background: var(--card); border: 1px solid #30363d; border-radius: 6px; padding: 1.5rem; transition: transform 0.2s; }
    .card:hover { transform: translateY(-5px); border-color: var(--accent); }
    .card h3 { margin: 0 0 0.5rem 0; }
    .card p { margin: 0 0 1rem 0; font-size: 0.9rem; color: #8b949e; }
    .card a { background: #238636; color: white; text-decoration: none; padding: 0.5rem 1rem; border-radius: 6px; font-weight: 600; }
    .tag { display: inline-block; background: #21262d; padding: 0.2rem 0.5rem; border-radius: 2rem; font-size: 0.75rem; margin-right: 0.5rem; }
  </style>
</head>
<body>
  <div class="header">
    <h1>100Days100Projects 💯</h1>
    <p>One project a day. For 100 days. Built by <a href="https://github.com/karthikbilaspur" style="color: var(--accent);">Karthik V</a></p>
  </div>
  
  <div class="filters">
    <button class="filter-btn active" onclick="filterProjects('all')">All</button>
    <button class="filter-btn" onclick="filterProjects('game')">🎮 Games</button>
    <button class="filter-btn" onclick="filterProjects('tool')">🛠️ Tools</button>
    <button class="filter-btn" onclick="filterProjects('ui')">🎨 UI</button>
    <button class="filter-btn" onclick="filterProjects('api')">🌐 API</button>
  </div>

  <div class="grid" id="project-grid"></div>

  <script>
    const projects = [
      { name: 'Snake', type: 'game', concepts: 'Canvas API, Game Loop', path: 'Snake' },
      { name: 'MemoryGame', type: 'game', concepts: 'Shuffling, Card Flip', path: 'MemoryGame' },
      { name: 'PomodoroTimer', type: 'tool', concepts: 'setInterval, Notifications', path: 'PomodoroTimer' },
      { name: 'Password Generator', type: 'tool', concepts: 'Math.random, Logic', path: 'Password Generator' },
      { name: 'Scientific Calculator', type: 'tool', concepts: 'eval(), Complex Logic', path: 'Scitenfic Calculator' },
      { name: 'Pokedex', type: 'api', concepts: 'Fetch API, PokeAPI', path: 'Pokedex' },
      { name: '3DBoxes', type: 'ui', concepts: 'CSS 3D Transforms', path: '3DBoxes' },
      { name: 'Expanding-Cards', type: 'ui', concepts: 'Flexbox, Transitions', path: 'expanding-cards' },
      // Add all 80+ projects here
    ];

    const grid = document.getElementById('project-grid');
    
    function renderProjects(filter = 'all') {
      grid.innerHTML = '';
      const filtered = filter === 'all' ? projects : projects.filter(p => p.type === filter);
      
      filtered.forEach(p => {
        grid.innerHTML += `
          <div class="card">
            <h3>${p.name}</h3>
            <p>${p.concepts}</p>
            <span class="tag">${p.type}</span>
            <a href="./${p.path}/" target="_blank">Live Demo</a>
          </div>
        `;
      });
    }

    function filterProjects(type) {
      document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
      event.target.classList.add('active');
      renderProjects(type);
    }

    renderProjects();
  </script>
</body>
</html>
