<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.0/css/all.min.css" integrity="sha512-usVcF46m0f2Tzrv4Wp0x1U9dp8R6dV2ZOG2jVIFIAnBME1E8QFT8Cx2n6Xq0rGLO+0xLcKJ2Oz22lJ0Z" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css" />
    <title>Dynamic Vertical Slider</title>
</head>
<body>
    <div class="slider-container" role="region" aria-label="Image slider with descriptions">
        <div class="left-slide">
            <!-- Content for each slide. Using data attributes for dynamic background colors. -->
            <div data-color="#FD3555">
                <h1>Nature Flower</h1>
                <p>All in pink, a beautiful sight</p>
            </div>
            <div data-color="#2A86BA">
                <h1>Azure Sky</h1>
                <p>Majestic mountains touching the clouds</p>
            </div>
            <div data-color="#252E33">
                <h1>Ancient Castle</h1>
                <p>A solitary fortress in the wild</p>
            </div>
            <div data-color="#FFB866">
                <h1>Flying Eagle</h1>
                <p>Soaring high as the sun sets</p>
            </div>
             <div data-color="#800080"> <!-- Added an extra slide for demonstration -->
                <h1>Mystic Forest</h1>
                <p>Deep greens and ancient trees</p>
            </div>
        </div>
        <div class="right-slide">
            <!-- Image for each slide. Using data attributes for dynamic background images. -->
            <div data-image="https://img.freepik.com/free-photo/cosmos-flowers_1373-83.jpg?semt=ais_hybrid&w=740&q=80"</div>
            <div data-image="https://images.unsplash.com/photo-1519981593452-666cf05569a9?ixlib=rb-0.3.5&ixid=eyJhcHBfaWQiOjEyMDd9&s=90ed8055f06493290dad8da9584a13f7&auto=format&fit=crop&w=715&q=80"></div>
            <div data-image="https://images.unsplash.com/photo-1486899430790-61dbf6f6d98b?ixlib=rb-0.3.5&ixid=eyJhcHBfaWQiOjEyMDd9&s=8ecdee5d1b3ed78ff16053b0227874a2&auto=format&fit=crop&w=1002&q=80"></div>
            <div data-image="https://images.unsplash.com/photo-1510942201312-84e7962f6dbb?ixlib=rb-0.3.5&ixid=eyJhcHBfaWQiOjEyMDd9&s=da4ca7a78004349f1b63f257e50e4360&auto=format&fit=crop&w=1050&q=80"></div>
             <div data-image="https://images.unsplash.com/photo-1532296068697-3f8d2b2c3c6f?ixlib=rb-4.0.3&ixid=MnwxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8&auto=format&fit=crop&w=1000&q=80"></div>
        </div>
        <div class="action-buttons">
            <button class="down-button" aria-label="Previous slide">
                <i class="fa-solid fa-arrow-down"></i>
            </button>
            <button class="up-button" aria-label="Next slide">
                <i class="fa-solid fa-arrow-up"></i>
            </button>
        </div>
        <div class="pagination-dots">
            <!-- Dots will be generated here by JavaScript -->
        </div>
    </div>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>&#169; 2026 All Rights Reserved KarthikCoding</p>
    </footer>
</body>
</html>
