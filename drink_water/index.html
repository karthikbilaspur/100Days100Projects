<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Water Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>💧 Water Tracker</h1>

<h3>Goal: <span id="goal-value">2</span> L</h3>
<input id="goal-input" type="number" placeholder="Liters" />
<button id="set-goal-btn">Set Goal</button>

<div class="cup">
  <div id="remained" class="remained">
    <span id="liters"></span>
    <small>Remaining</small>
  </div>
  <div id="percentage" class="percentage"></div>
</div>

<div class="cups" id="cups"></div>

<button id="reset-btn">Reset</button>

<div id="statistics">
  <h3>Stats</h3>
  <p>Total: <span id="total-water"></span> L</p>
  <p>Average: <span id="average"></span> L/day</p>
</div>

<script src="script.js"></script>
</body>
</html>
